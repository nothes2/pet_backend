server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pet_health_system?serverTimezone=Asia/Shanghai&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
  mail:
    host: ${SPRING_MAIL_HOST:smtp.qq.com}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    port: ${SPRING_MAIL_PORT:587}
    protocol: ${SPRING_MAIL_PROTOCOL:smtp}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          ssl:
            enable: ${SPRING_MAIL_SMTP_SSL_ENABLE:false}
            trust: ${SPRING_MAIL_SMTP_SSL_TRUST:smtp.qq.com}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
            required: ${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:true}
          connectiontimeout: ${SPRING_MAIL_SMTP_CONNECTIONTIMEOUT:5000}
          timeout: ${SPRING_MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${SPRING_MAIL_SMTP_WRITETIMEOUT:5000}
        debug: ${SPRING_MAIL_DEBUG:false}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}
  jackson:
    serialization:
      write-dates-as-timestamps: ${SPRING_JACKSON_SERIALIZATION_WRITE_DATES_AS_TIMESTAMPS:false}

security:
  jwt:
    # 至少 32 位随机字符串，生产环境请使用强度更高的值并放到环境变量/配置中心
    secret: ${SECURITY_JWT_SECRET:change-me-please-change-me-please-123456}
    # 过期时间（小时），默认 7 天
    expiration-hours: ${SECURITY_JWT_EXPIRATION_HOURS:168}
