services:
  mysql:
    image: mysql:8.4
    container_name: pet-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-pet_root_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pet_health_system}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db_pet.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 20
  backend:
    build:
      context: ./pet-serve
      dockerfile: Dockerfile
    container_name: pet-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-pet_health_system}?serverTimezone=Asia/Shanghai&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-pet_root_pass}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-change-me-please-change-me-please-123456}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.qq.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_PROTOCOL: ${SPRING_MAIL_PROTOCOL:-smtp}
      SPRING_MAIL_DEBUG: ${SPRING_MAIL_DEBUG:-false}
  frontend:
    build:
      context: ./pet-front
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: pet-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  mysql_data:
