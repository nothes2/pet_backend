name: Deploy To Server

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || 'latest' }}
    steps:
      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
          BRANCH_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          envs: IMAGE_TAG,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,SERVER_APP_DIR,BRANCH_NAME
          script: |
            set -euo pipefail

            cd "$SERVER_APP_DIR"
            git fetch --all
            git checkout "$BRANCH_NAME"
            git pull --ff-only origin "$BRANCH_NAME"

            if [ ! -f .env.prod ]; then
              cp .env.prod.example .env.prod
            fi

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            BACKEND_IMAGE="$DOCKERHUB_USERNAME/pet-backend:$IMAGE_TAG" \
            FRONTEND_IMAGE="$DOCKERHUB_USERNAME/pet-frontend:$IMAGE_TAG" \
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull

            BACKEND_IMAGE="$DOCKERHUB_USERNAME/pet-backend:$IMAGE_TAG" \
            FRONTEND_IMAGE="$DOCKERHUB_USERNAME/pet-frontend:$IMAGE_TAG" \
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans

            docker image prune -f
